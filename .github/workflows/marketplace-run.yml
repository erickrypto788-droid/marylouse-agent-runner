name: Marketplace ofertas

run-name: Postar ${{ inputs.post_count }} oferta(s) de ${{ inputs.marketplace }}

on:
  workflow_dispatch:
    inputs:
      marketplace:
        description: "Marketplace alvo: shopee, aliexpress ou mercadolivre"
        required: true
        default: "shopee"
      post_count:
        description: "Quantidade de produtos para postar"
        required: true
        default: "5"

  workflow_call:
    inputs:
      marketplace:
        required: true
        type: string
      post_count:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: marylouse-marketplace-${{ inputs.marketplace }}
  cancel-in-progress: false

jobs:
  run-marketplace:
    name: Rodar marketplace selecionado
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Baixar repositório do agente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests PyYAML python-dotenv
          fi

      - name: Baixar repositório público do site
        uses: actions/checkout@v4
        with:
          repository: erickrypto788-droid/marylouse-ofertas
          token: ${{ secrets.SITE_REPO_TOKEN }}
          path: site_live
          fetch-depth: 0

      - name: Preparar dados atuais do site
        run: |
          mkdir -p site/data

          if [ -f site_live/data/offers.json ]; then
            cp site_live/data/offers.json site/data/offers.json
          else
            echo "[]" > site/data/offers.json
          fi

          if [ -f site_live/data/coupons.json ]; then
            cp site_live/data/coupons.json site/data/coupons.json
          else
            echo "[]" > site/data/coupons.json
          fi

      - name: Configurar marketplace alvo
        env:
          TARGET_MARKETPLACE: ${{ inputs.marketplace }}
          POST_COUNT: ${{ inputs.post_count }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          target = os.getenv("TARGET_MARKETPLACE", "").strip().lower()
          count = int(os.getenv("POST_COUNT", "1"))

          if target not in {"shopee", "aliexpress", "mercadolivre"}:
              raise SystemExit(f"Marketplace inválido: {target}")

          path = Path("config.yaml")
          cfg = yaml.safe_load(path.read_text(encoding="utf-8")) or {}

          agent = cfg.setdefault("agent", {})
          agent["dry_run"] = False
          agent["post_one_per_marketplace"] = True
          agent["posts_per_marketplace"] = count
          agent["post_limit_per_run"] = count
          agent["posts_per_marketplace_by_marketplace"] = {
              target: count
          }

          marketplaces = cfg.setdefault("marketplaces", {})

          for name, mcfg in marketplaces.items():
              if isinstance(mcfg, dict):
                  mcfg["enabled"] = str(name).strip().lower() == target

          niches = cfg.setdefault("niches", {})

          if target == "mercadolivre":
              # Mercado Livre tem rotação interna própria em marketplaces.mercadolivre.keyword_groups.
              niches["enabled"] = False
          else:
              niches["enabled"] = True
              niches["state_file"] = f"data/niche_state_{target}.json"

              lists = niches.get("lists", {}) or {}

              for key, item in lists.items():
                  if not isinstance(item, dict):
                      continue

                  only = item.get("only_marketplaces") or []
                  only = {str(x).strip().lower() for x in only if str(x).strip()}

                  # Se o nicho é exclusivo de outro marketplace, desativa nesta execução.
                  if only and target not in only:
                      item["enabled"] = False
                  else:
                      item["enabled"] = True

          if target == "mercadolivre":
              marketplaces.setdefault("mercadolivre", {})["posts_per_run"] = count

          if target == "aliexpress":
              marketplaces.setdefault("aliexpress", {})["posts_per_run"] = count

          if target == "shopee":
              marketplaces.setdefault("shopee", {})["posts_per_run"] = count

          path.write_text(
              yaml.safe_dump(cfg, allow_unicode=True, sort_keys=False, default_flow_style=False),
              encoding="utf-8",
          )

          print(f"[workflow] Marketplace alvo: {target}")
          print(f"[workflow] Quantidade: {count}")
          PY

      - name: Testar sintaxe Python
        run: |
          python -m py_compile src/copywriter.py
          python -m py_compile src/agent.py
          python -m py_compile src/scoring.py
          python -m py_compile src/marketplaces/aliexpress.py
          python -m py_compile src/marketplaces/mercadolivre.py
          python -m py_compile src/site_publisher.py

      - name: Rodar agente
        env:
          DRY_RUN: "false"

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_SECRET: ${{ secrets.SHOPEE_SECRET }}
          SHOPEE_ENDPOINT: ${{ secrets.SHOPEE_ENDPOINT }}

          ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_SECRET: ${{ secrets.ALIEXPRESS_SECRET }}
          ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}
          ALIEXPRESS_ENDPOINT: ${{ secrets.ALIEXPRESS_ENDPOINT }}

          MERCADOLIVRE_CLIENT_ID: ${{ secrets.MERCADOLIVRE_CLIENT_ID }}
          MERCADOLIVRE_CLIENT_SECRET: ${{ secrets.MERCADOLIVRE_CLIENT_SECRET }}
          MERCADOLIVRE_REFRESH_TOKEN: ${{ secrets.MERCADOLIVRE_REFRESH_TOKEN }}
          MERCADOLIVRE_MATT_WORD: ${{ secrets.MERCADOLIVRE_MATT_WORD }}
          MERCADOLIVRE_MATT_TOOL: ${{ secrets.MERCADOLIVRE_MATT_TOOL }}

        run: |
          if [ -z "${SHOPEE_ENDPOINT:-}" ]; then unset SHOPEE_ENDPOINT; fi
          if [ -z "${ALIEXPRESS_ENDPOINT:-}" ]; then unset ALIEXPRESS_ENDPOINT; fi

          python run.py --once --post

      - name: Atualizar ofertas no repositório do site
        run: |
          mkdir -p site_live/data
          cp site/data/offers.json site_live/data/offers.json

      - name: Commit e push no site público
        working-directory: site_live
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add data/offers.json
            git commit -m "Atualiza ofertas automaticamente"
            git push
          else
            echo "Sem alterações no site público."
          fi

      - name: Persistir estado do agente
        continue-on-error: true
        run: |
          set +e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          STATE_FILES=(
            "data/agent.sqlite3"
            "data/niche_state.json"
            "data/niche_state_shopee.json"
            "data/niche_state_aliexpress.json"
            "data/mercadolivre_niche_state.json"
            "data/mercadolivre_oauth_token.json"
          )

          mkdir -p data
          mkdir -p /tmp/marylouse-state

          for file in "${STATE_FILES[@]}"; do
            if [ -f "$file" ]; then
              cp "$file" "/tmp/marylouse-state/$(basename "$file")"
            fi
          done

          git fetch origin main
          git reset --hard origin/main

          mkdir -p data

          for file in "${STATE_FILES[@]}"; do
            base="$(basename "$file")"
            if [ -f "/tmp/marylouse-state/$base" ]; then
              cp "/tmp/marylouse-state/$base" "$file"
            fi
          done

          git add "${STATE_FILES[@]}" || true

          if [ -n "$(git status --porcelain -- "${STATE_FILES[@]}")" ]; then
            git commit -m "Atualiza estado do agente [skip ci]" || true
            git push || true
          else
            echo "Sem alterações no estado do agente."
          fi
