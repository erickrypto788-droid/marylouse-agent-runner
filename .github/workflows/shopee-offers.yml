                      "mesa gamer",
                      "volante gamer",
                      "controle arcade",
                      "game stick",
                      "tv box game"
                  ],
              },
          ]

          state_path = Path("data/shopee_workflow_state.json")
          state_path.parent.mkdir(parents=True, exist_ok=True)

          if state_path.exists():
              try:
                  state = json.loads(state_path.read_text(encoding="utf-8"))
                  if not isinstance(state, dict):
                      state = {}
              except Exception:
                  state = {}
          else:
              state = {}

          index = int(state.get("next_index", 0))
          group = groups[index % len(groups)]

          state["next_index"] = (index + 1) % len(groups)
          state["last_key"] = group["key"]
          state["last_name"] = group["name"]

          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")

          path = Path("config.yaml")
          cfg = yaml.safe_load(path.read_text(encoding="utf-8")) or {}

          # Desativa rotação global de nichos para não haver interferência.
          cfg.setdefault("niches", {})["enabled"] = False
          cfg["active_niche"] = {
              "key": group["key"],
              "name": group["name"],
          }

          agent = cfg.setdefault("agent", {})
          agent["dry_run"] = False
          agent["post_one_per_marketplace"] = True
          agent["posts_per_marketplace"] = post_count
          agent["post_limit_per_run"] = post_count
          agent["posts_per_marketplace_by_marketplace"] = {
              "shopee": post_count
          }

          marketplaces = cfg.setdefault("marketplaces", {})

          for name, mcfg in marketplaces.items():
              if isinstance(mcfg, dict):
                  mcfg["enabled"] = str(name).strip().lower() == "shopee"

          shopee = marketplaces.setdefault("shopee", {})
          shopee["enabled"] = True
          shopee["keywords"] = group["keywords"]
          shopee["posts_per_run"] = post_count

          filters = cfg.setdefault("filters", {})
          allowed = filters.setdefault("allowed_marketplaces", [])

          if isinstance(allowed, list):
              filters["allowed_marketplaces"] = ["shopee"]

          marketplace_filters = filters.setdefault("marketplace_filters", {})
          marketplace_filters["shopee"] = {
              "min_price": group["min_price"],
              "max_price": group["max_price"],
          }

          path.write_text(
              yaml.safe_dump(cfg, allow_unicode=True, sort_keys=False, default_flow_style=False),
              encoding="utf-8",
          )

          print(f"[workflow-shopee] Nicho ativo: {group['name']} ({group['key']}) | {len(group['keywords'])} keywords")
          print(f"[workflow-shopee] post_count={post_count}")
          PY

      - name: Testar sintaxe Python
        run: |
          python -m py_compile src/copywriter.py
          python -m py_compile src/agent.py
          python -m py_compile src/scoring.py
          python -m py_compile src/marketplaces/shopee.py
          python -m py_compile src/site_publisher.py

      - name: Rodar agente Shopee
        env:
          DRY_RUN: "false"

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_SECRET: ${{ secrets.SHOPEE_SECRET }}
          SHOPEE_ENDPOINT: ${{ secrets.SHOPEE_ENDPOINT }}

        run: |
          if [ -z "${SHOPEE_ENDPOINT:-}" ]; then unset SHOPEE_ENDPOINT; fi
          python run.py --once --post

      - name: Atualizar ofertas no repositório do site
        run: |
          mkdir -p site_live/data
          cp site/data/offers.json site_live/data/offers.json

      - name: Commit e push no site público
        working-directory: site_live
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add data/offers.json
            git commit -m "Atualiza ofertas Shopee"
            git push
          else
            echo "Sem alterações no site público."
          fi

      - name: Persistir estado do agente
        continue-on-error: true
        run: |
          set +e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          STATE_FILES=(
            "data/agent.sqlite3"
            "data/shopee_workflow_state.json"
          )

          mkdir -p data
          mkdir -p /tmp/marylouse-state

          for file in "${STATE_FILES[@]}"; do
            if [ -f "$file" ]; then
              cp "$file" "/tmp/marylouse-state/$(basename "$file")"
            fi
          done

          git fetch origin main
          git reset --hard origin/main

          mkdir -p data

          for file in "${STATE_FILES[@]}"; do
            base="$(basename "$file")"
            if [ -f "/tmp/marylouse-state/$base" ]; then
              cp "/tmp/marylouse-state/$base" "$file"
            fi
          done

          git add "${STATE_FILES[@]}" || true

          if [ -n "$(git status --porcelain -- "${STATE_FILES[@]}")" ]; then
            git commit -m "Atualiza estado Shopee [skip ci]" || true
            git push || true
          else
            echo "Sem alterações no estado Shopee."
          fi
