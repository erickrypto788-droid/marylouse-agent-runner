name: Shopee ofertas

run-name: Shopee - ${{ github.event.inputs.post_count }} produto(s)

on:
  workflow_dispatch:
    inputs:
      post_count:
        description: "Quantidade de produtos Shopee"
        required: true
        default: "5"

permissions:
  contents: write

concurrency:
  group: marylouse-shopee
  cancel-in-progress: false

jobs:
  shopee:
    name: Rodar Shopee independente
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Baixar repositório do agente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests PyYAML python-dotenv
          fi

      - name: Baixar repositório público do site
        uses: actions/checkout@v4
        with:
          repository: erickrypto788-droid/marylouse-ofertas
          token: ${{ secrets.SITE_REPO_TOKEN }}
          path: site_live
          fetch-depth: 0

      - name: Preparar dados atuais do site
        run: |
          mkdir -p site/data

          if [ -f site_live/data/offers.json ]; then
            cp site_live/data/offers.json site/data/offers.json
          else
            echo "[]" > site/data/offers.json
          fi

          if [ -f site_live/data/coupons.json ]; then
            cp site_live/data/coupons.json site/data/coupons.json
          else
            echo "[]" > site/data/coupons.json
          fi

